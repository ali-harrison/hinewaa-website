<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" preserveAspectRatio="none">
  <defs>
    <!-- single chevron (160w x 120h) anchored at (0,0) bottom-left = y=120 -->
    <path id="chevron" d="M0,120 L80,0 L160,120 L120,120 L80,60 L40,120 Z" />
  </defs>

  <!-- four columns of stacked chevrons -->
  <g fill="#C85A3E" stroke="none">
    <!-- column 1 (x = 120) -->
    <use href="#chevron" transform="translate(120,880)"/>
    <use href="#chevron" transform="translate(120,760)"/>
    <use href="#chevron" transform="translate(120,640)"/>
    <use href="#chevron" transform="translate(120,520)"/>
    <use href="#chevron" transform="translate(120,400)"/>
    <use href="#chevron" transform="translate(120,280)"/>
    <use href="#chevron" transform="translate(120,160)"/>

    <!-- column 2 (x = 320) -->
    <use href="#chevron" transform="translate(320,880)"/>
    <use href="#chevron" transform="translate(320,760)"/>
    <use href="#chevron" transform="translate(320,640)"/>
    <use href="#chevron" transform="translate(320,520)"/>
    <use href="#chevron" transform="translate(320,400)"/>
    <use href="#chevron" transform="translate(320,280)"/>
    <use href="#chevron" transform="translate(320,160)"/>

    <!-- column 3 (x = 520) -->
    <use href="#chevron" transform="translate(520,880)"/>
    <use href="#chevron" transform="translate(520,760)"/>
    <use href="#chevron" transform="translate(520,640)"/>
    <use href="#chevron" transform="translate(520,520)"/>
    <use href="#chevron" transform="translate(520,400)"/>
    <use href="#chevron" transform="translate(520,280)"/>
    <use href="#chevron" transform="translate(520,160)"/>

    <!-- column 4 (x = 720) -->
    <use href="#chevron" transform="translate(720,880)"/>
    <use href="#chevron" transform="translate(720,760)"/>
    <use href="#chevron" transform="translate(720,640)"/>
    <use href="#chevron" transform="translate(720,520)"/>
    <use href="#chevron" transform="translate(720,400)"/>
    <use href="#chevron" transform="translate(720,280)"/>
    <use href="#chevron" transform="translate(720,160)"/>
  </g>
</svg>
